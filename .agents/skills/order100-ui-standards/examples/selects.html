<!-- ============================================== -->
<!-- 1. STANDARD NATIVE SELECT                      -->
<!-- ============================================== -->
<select class="mt-1 block w-full rounded-md border-slate-300 py-2 pl-3 pr-10 text-base focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
    <option selected>USA</option>
    <option>Canada</option>
    <option>EU</option>
</select>

<!-- ============================================== -->
<!-- 2. SEARCHABLE MULTI-SELECT (TomSelect)         -->
<!-- ============================================== -->
<!-- 
  NOTE: Never use native <select multiple>. 
  Always use TomSelect or Choices.js initialized on a hidden input or select, 
  and style the dropdown wrapper to match Tailwind UI inputs. 
-->
<div class="relative">
    <select id="o100-multi-search" multiple placeholder="Select options..." autocomplete="off" class="w-full">
        <option value="1">Option 1</option>
        <option value="2">Option 2</option>
        <option value="3">Option 3</option>
    </select>
</div>
<!-- 
  JavaScript init example:
  new TomSelect('#o100-multi-search', {
      plugins: ['remove_button'],
      create: false
  });
-->
