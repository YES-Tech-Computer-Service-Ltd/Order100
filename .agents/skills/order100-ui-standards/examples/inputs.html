<!-- ============================================== -->
<!-- 1. STANDARD TEXT / NUMBER INPUT                -->
<!-- ============================================== -->
<input 
    type="text" 
    class="w-full text-sm rounded-lg border-slate-300 focus:ring-indigo-500 focus:border-indigo-500" 
    placeholder="Enter value..."
/>

<!-- ============================================== -->
<!-- 2. COMBINED INPUT (INPUT + STATIC TEXT ADDON)  -->
<!-- ============================================== -->
<div class="flex items-stretch rounded-md shadow-sm">
    <!-- Left Input -->
    <input 
        type="number" 
        class="flex-1 block w-full border-slate-300 focus:ring-indigo-500 focus:border-indigo-500" 
        style="margin:0; border-top-right-radius:0; border-bottom-right-radius:0; border-right:0; border-top-left-radius:4px; border-bottom-left-radius:4px; font-size:14px; padding-top:6px; padding-bottom:6px; box-shadow:none;" 
        value="30"
    />
    <!-- Right Addon (Span) -->
    <span 
        class="inline-flex items-center px-3 border border-slate-300 text-slate-500" 
        style="margin:0; border-top-left-radius:0; border-bottom-left-radius:0; border-top-right-radius:4px; border-bottom-right-radius:4px; background-color:#f8fafc; font-size:14px;"
    >
        days
    </span>
</div>

<!-- ============================================== -->
<!-- 3. COMBINED INPUT (INPUT + SELECT DROPDOWN)    -->
<!-- ============================================== -->
<div class="flex items-stretch rounded-md shadow-sm">
    <!-- Left Input -->
    <input 
        type="number" 
        class="flex-1 block w-full border-slate-300 focus:ring-indigo-500 focus:border-indigo-500" 
        style="margin:0; border-top-right-radius:0; border-bottom-right-radius:0; border-right:0; border-top-left-radius:4px; border-bottom-left-radius:4px; font-size:14px; padding-top:6px; padding-bottom:6px; box-shadow:none;" 
        value="365"
    />
    <!-- Right Addon (Select) -->
    <select 
        class="inline-flex items-center border border-slate-300 text-slate-600 focus:ring-indigo-500 focus:border-indigo-500 pr-8" 
        style="margin:0; border-top-left-radius:0; border-bottom-left-radius:0; border-top-right-radius:4px; border-bottom-right-radius:4px; background-color:#f8fafc; font-size:14px; box-shadow:none;"
    >
        <option value="days">Days</option>
        <option value="weeks">Weeks</option>
        <option value="months">Months</option>
        <option value="years">Years</option>
    </select>
</div>
