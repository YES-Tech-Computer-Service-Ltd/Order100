<!-- ============================================== -->
<!-- 1. STANDARD SAVE BUTTON (Admin Header)         -->
<!-- ============================================== -->
<button 
    id="o100-save-btn" 
    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-bold shadow-sm transition-colors text-sm"
>
    Save Settings
</button>

<!-- ============================================== -->
<!-- 2. SECONDARY / OUTLINE BUTTON                  -->
<!-- ============================================== -->
<button type="button" class="inline-flex justify-center rounded-xl border border-slate-300 bg-white py-2 px-4 text-sm font-bold text-slate-700 shadow-sm hover:bg-slate-50 transition-colors">
    Cancel / Secondary
</button>

<!-- ============================================== -->
<!-- 3. DANGER BUTTON                               -->
<!-- ============================================== -->
<button type="button" class="inline-flex justify-center rounded-xl border border-transparent bg-red-600 py-2 px-4 text-sm font-bold text-white shadow-sm hover:bg-red-700 transition-colors">
    Delete / Danger
</button>

<!-- ============================================== -->
<!-- 4. SMALL ACTION BUTTON (For Tables)            -->
<!-- ============================================== -->
<button type="button" class="inline-flex items-center rounded-md bg-white px-3 py-1.5 text-xs font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 transition-colors">
    Edit
</button>

<!-- ============================================== -->
<!-- 5. ICON ACTION BUTTON (Tables with Tooltips)   -->
<!-- ============================================== -->
<!-- 
  Requires `o100-admin.css` containing `.o100-action-icon-btn`.
  Uses pure CSS `data-tooltip` for hover bubble (pops upward).
  For proper z-index layering inside tables with sticky headers, 
  ensure the parent table column has `z-index` handling on hover.
-->
<div class="flex items-center justify-center gap-2">
    <!-- Edit -->
    <button type="button" class="o100-action-icon-btn edit" data-tooltip="Edit">
        <svg class="w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
        </svg>
    </button>
    <!-- Duplicate -->
    <button type="button" class="o100-action-icon-btn duplicate" data-tooltip="Duplicate">
        <svg class="w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
        </svg>
    </button>
    <!-- Delete -->
    <button type="button" class="o100-action-icon-btn delete" data-tooltip="Delete">
        <svg class="w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
        </svg>
    </button>
</div>
